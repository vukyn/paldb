site_name: PalDB
site_description: Palworld knowledge base — human lookup + LLM reference
site_author: vukyn
# GitHub Pages project site (subpath /paldb/). Needed for the i18n language
# switcher, sitemap, and canonical URLs. Change if a custom domain is added.
site_url: https://vukyn.github.io/paldb/
# Palworld game database. Markdown entities with frontmatter stats + [[wikilinks]].

# Dev server on :10000 (avoid the crowded :8000 range).
dev_addr: 127.0.0.1:10000

theme:
  name: material
  palette:
    # Dark default (game-DB reads better dark), toggle to light.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark
  features:
    # NOTE: navigation.instant intentionally OFF — it is incompatible with the
    # i18n language switcher (instant SPA nav bounces language switch to home).
    - navigation.tracking
    - navigation.top
    - navigation.indexes   # section index pages (index.md per folder)
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow

markdown_extensions:
  - meta                   # frontmatter as page.meta
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      # ```mermaid fences render as diagrams (relationship graphs, breeding chains).
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
  - toc:
      permalink: true

plugins:
  - search
  # EN/VI bilingual. Unsuffixed file = EN (default/source of truth); `.vi.md` =
  # Vietnamese. Missing VI falls back to EN. Adds a header language switcher.
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: vi
          name: Tiếng Việt
          build: true
          # Translate the left-nav labels (EN nav title → VI). Game proper nouns
          # (Pals, element names) stay English.
          nav_translations:
            Home: Trang chủ
            Paldeck: Paldeck
            Items: Vật phẩm
            Materials: Nguyên liệu
            Food: Thức ăn
            Spheres: Sphere
            Ammo: Đạn dược
            Consumables: Vật phẩm tiêu hao
            Construction: Xây dựng
            Production: Sản xuất
            Pal: Pal
            Defenses: Phòng thủ
            Technology: Công nghệ
            Elements: Nguyên tố
            Work Suitability: Khả năng lao động
            Work Priority: Ưu tiên công việc
            Sanity: Tinh thần
            Locations: Địa điểm
            Guides: Hướng dẫn
  # [[wikilinks]] and [[target|label]] resolved to real page paths.
  - roamlinks
  # Tag index across entities (element tags, work tags).
  - tags

# Maintainer docs that live under docs/ but should not become site pages.
exclude_docs: |
  assets/icons/README.md

extra_css:
  - stylesheets/entity.css

extra_javascript:
  # Interactive widgets (self-contained, no CDN). Each guards on its own
  # container id, so loading globally is a no-op on pages without it.
  - javascripts/type-chart.js
  - javascripts/food-meter.js
  - javascripts/table-filter.js
  # Cmd/Ctrl+K opens the global search box.
  - javascripts/search-shortcut.js

# Nav mirrors Palworld's own organization: Paldeck (Pals) · Items (Materials /
# Food / Spheres / Consumables) · Construction (structures by build category:
# Production / Pal / Defenses …) · Technology (mechanics). Each entity page is
# listed so the tree is browsable; index pages stay as filtered overviews.
# Category header VI names live in plugins.i18n.nav_translations above.
nav:
  - Home: index.md
  - Paldeck: pals/index.md
  - Items:
    - Materials: items/materials/index.md
    - Food: items/food/index.md
    - Spheres: items/spheres/index.md
    - Ammo: items/ammo/index.md
    - Consumables: items/consumables/index.md
  - Construction:
    - Production: construction/production/index.md
    - Pal: construction/pal/index.md
    - Defenses: construction/defenses/index.md
    - Food: construction/food/index.md
  - Technology:
    - mechanics/index.md
    - Elements: mechanics/elements.md
    - Work Suitability: mechanics/work-suitability.md
    - Work Priority: mechanics/work-priority.md
    - Sanity: mechanics/sanity.md
  - Locations: locations/index.md
  - Guides: guides/index.md
